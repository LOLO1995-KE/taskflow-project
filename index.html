<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestor de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <h1>📋 TaskFlow</h1>
            <p>Gestiona tus tareas de forma eficiente</p>
        </header>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <!-- BARRA LATERAL (ASIDE) -->
            <aside class="sidebar">
                <h3>Filtros</h3>
                <ul class="filters">
                    <li class="filter-item active">📌 Todas las tareas</li>
                    <li class="filter-item">⭐ Importantes</li>
                    <li class="filter-item">📅 Hoy</li>
                    <li class="filter-item">✅ Completadas</li>
                </ul>
                
                <h3>Categorías</h3>
                <ul class="categories">
                    <li class="category-item">💼 Trabajo</li>
                    <li class="category-item">🏠 Personal</li>
                    <li class="category-item">📚 Estudio</li>
                    <li class="category-item">🛒 Compras</li>
                </ul>
            </aside>

                   <!-- SECCIÓN DE TAREAS -->
        <section class="tasks-section">
            <h2>Mis Tareas</h2>
            
            <!-- FORMULARIO PARA AÑADIR TAREAS -->
            <form id="task-form" class="task-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="task-input" 
                        placeholder="Escribe una nueva tarea..." 
                        required
                    >
                    <select id="category-select">
                        <option value="💼 Trabajo">💼 Trabajo</option>
                        <option value="🏠 Personal">🏠 Personal</option>
                        <option value="📚 Estudio">📚 Estudio</option>
                        <option value="🛒 Compras">🛒 Compras</option>
                    </select>
                    <select id="priority-select">
                        <option value="high">Alta</option>
                        <option value="medium">Media</option>
                        <option value="low">Baja</option>
                    </select>
                    <button type="submit" class="btn-primary">➕ Añadir</button>
                </div>
            </form>

            <!-- LISTA DE TAREAS (AHORA VACÍA) -->
            <div id="tasks-list" class="tasks-list">
                <!-- Las tareas se insertarán aquí con JavaScript -->
            </div>
        </section>
        </main>
    </div>
        <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestor de Tareas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-redesign.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <h1>📋 TaskFlow</h1>
            <p>Gestiona tus tareas de forma eficiente</p>
        </header>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <!-- BARRA LATERAL (ASIDE) -->
            <aside class="sidebar">
                <h3>Filtros</h3>
                <ul class="filters">
                    <!-- Filtros principales -->
                    <li class="filter-item" data-filter="favorites">⭐ Importantes</li>
                    <li class="filter-item" data-filter="today">📅 Hoy</li>
                    
                    <!-- Filtros de estado -->
                    <li class="filter-item status-option active" data-status="all">📋 Todas</li>
                    <li class="filter-item status-option" data-status="pending">⏳ Pendientes</li>
                    <li class="filter-item status-option" data-status="completed">✅ Completadas</li>
                </ul>

                <select id="sort-priority">
                    <option value="default">Orden por defecto</option>
                    <option value="high-to-low">Prioridad (alta → baja)</option>
                    <option value="low-to-high">Prioridad (baja → alta)</option>
                    <option value="newest">Más reciente primero</option>
                    <option value="oldest">Más antiguo primero</option>
                </select>
                
                <h3>Categorías</h3>
                <ul class="categories">
                    <li class="category-item" data-category="Trabajo">💼 Trabajo</li>
                    <li class="category-item" data-category="Personal">🏠 Personal</li>
                    <li class="category-item" data-category="Estudio">📚 Estudio</li>
                    <li class="category-item" data-category="Compras">🛒 Compras</li>
                </ul>

                <h3>Estadísticas</h3>
                <div class="progress-container">
                    <div class="progress-label">Progreso:</div>
                    <div class="progress-circle" aria-label="Porcentaje de tareas completadas" role="img">
                        <svg class="progress-svg" width="92" height="92" viewBox="0 0 100 100">
                            <circle class="progress-ring-bg" cx="50" cy="50" r="45"></circle>
                            <circle class="progress-ring" id="progress-ring" cx="50" cy="50" r="45"></circle>
                        </svg>
                        <div class="progress-circle-text" id="progress-percent">0%</div>
                    </div>
                </div>
                
                <!-- Botones extra -->
                <div class="extra-buttons">
                    <button id="mark-all-btn" class="extra-btn">✅ Marcar todas como completadas</button>
                    <button id="clear-completed-btn" class="extra-btn">🗑️ Borrar completadas</button>
                    <button id="dark-mode-toggle" class="extra-btn">🌙 Modo oscuro</button>
                    <button id="export-tasks" class="extra-btn">📤 Exportar tareas</button>
                    <button id="import-tasks" class="extra-btn">📥 Importar tareas</button>
                </div>
            </aside>

            <!-- SECCIÓN DE TAREAS -->
            <section class="tasks-section">
                <h2>Mis Tareas</h2>
                
                <!-- FORMULARIO PARA AÑADIR TAREAS -->
                <form id="task-form" class="task-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="task-input" 
                            placeholder="Escribe una nueva tarea..." 
                            required
                        >
                        <select id="category-select">
                            <option value="Trabajo">💼 Trabajo</option>
                            <option value="Personal">🏠 Personal</option>
                            <option value="Estudio">📚 Estudio</option>
                            <option value="Compras">🛒 Compras</option>
                        </select>
                        <select id="priority-select">
                            <option value="high">Alta</option>
                            <option value="medium">Media</option>
                            <option value="low">Baja</option>
                        </select>
                        <button type="submit" class="btn-primary">➕ Añadir</button>
                    </div>
                </form>

                <!-- LISTA DE TAREAS -->
                <div id="tasks-list" class="tasks-list">
                    <!-- Las tareas se insertarán aquí con JavaScript -->
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
